name: Free DevOps Job Bot

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests beautifulsoup4

    - name: Run script
      run: python jobs.py

    - name: Upload CSV
      uses: actions/upload-artifact@v4
      with:
        name: jobs
        path: jobs.csv
