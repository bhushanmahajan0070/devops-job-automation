name: DevOps Job Fetcher

on:
  schedule:
    - cron: '30 3 * * *'  # Runs daily (9 AM IST)
  workflow_dispatch:

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run script
      run: python jobs.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: job-list
        path: jobs.csv
